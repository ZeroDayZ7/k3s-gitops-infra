  #   container_name: grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
  #   networks:
  #     - app-network

secrets:
  mongo_pass:
    file: ./secrets/.mongo_pass
  mysql_pass:
    file: ./secrets/.mysql_pass
  redis_pass:
    file: ./secrets/.redis_pass

volumes:
  mongodb_data:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
