upstream go_backend {
    server tv2_go_api:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    server_name api.local;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.local;

    ssl_certificate     /etc/nginx/certs/myapp.local.pem;
    ssl_certificate_key /etc/nginx/certs/myapp.local-key.pem;

    # 🔐 Security headers
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 🌐 Real IP handling (important behind proxy)
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # 🔌 Connection limiting
    limit_conn conn_limit 20;

    # 🔥 Global API rate limit
    limit_req_status 429;

    # ⏱️ Timeouts (protect backend)
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
    send_timeout 10s;

    # 📦 Buffering (performance)
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    # 🧠 Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 🚦 General API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://go_backend/;
    }

    # 🔐 Example: stricter endpoint (login/auth)
    location /api/v1/go/login {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://go_backend;
    }

    # 🌍 Frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 🧾 Optional: health check endpoint (nice for orchestration)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}