  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: prometheus
  #   volumes:
  #     - ./deployments/otel/prometheus.yaml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"

  # jaeger:
  #   <<: *common-settings
  #   image: jaegertracing/all-in-one:latest
  #   container_name: jaeger
  #   ports:
  #     - "16686:16686"
  #     - "4317"

  # grafana:
  #   <<: *common-settings
  #   image: grafana/grafana:latest
  #   container_name: grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

secrets:
  mongo_pass:
    file: ./secrets/.MONGO_PASS
  mysql_root_pass:
    file: ./secrets/.MYSQL_ROOT_PASS
  mysql_user_pass:
    file: ./secrets/.MYSQL_USER_PASS
  redis_pass:
    file: ./secrets/.REDIS_PASS

volumes:
  mongodb_data:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
