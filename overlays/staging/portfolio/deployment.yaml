apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: nginx-placeholder
        image: nginx:stable-alpine
        ports:
        - containerPort: 80