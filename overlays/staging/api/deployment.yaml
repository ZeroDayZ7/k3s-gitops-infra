apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault

      imagePullSecrets:
        - name: ghcr-secret

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          securityContext:
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done;",
            ]

      containers:
        - name: go-api
          image: ghcr.io/zerodayz7/http-server-api:f68d8e9
          ports:
            - containerPort: 8080

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"

          envFrom:
            - configMapRef:
                name: api-config

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database
            - name: DB_HOST
              value: "mysql"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: FINGERPRINT_SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: FINGERPRINT_SALT

          volumeMounts:
            - name: migrations-dir
              mountPath: /app/migrations
              readOnly: true
            - name: app-logs
              mountPath: /home/appuser/logs
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: migrations-dir
          configMap:
            name: api-migrations
        - name: app-logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}