apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: go-api
          image: ghcr.io/zerodayz7/http-server-api:a903b71
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: api-config

          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database
            - name: DB_HOST
              value: "mysql"

            # REDIS
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password

            # APP SECRETS
            - name: FINGERPRINT_SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: FINGERPRINT_SALT

          volumeMounts:
            - name: migrations-dir
              mountPath: /app/migrations
              readOnly: true

      volumes:
        - name: migrations-dir
          configMap:
            name: api-migrations
